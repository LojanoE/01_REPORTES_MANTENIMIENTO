<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Bodegas - GDR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.0.0">
</head>
<body>
    <div id="userBar"></div>

    <div class="container-fluid py-4">
        <header class="text-center mb-4">
            <h1 class="main-title">CONTROL DE BODEGAS</h1>
            <p class="subtitle">&#20179;&#24211;&#25511;&#21046;&#31995;&#32479;</p>
        </header>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs mb-4 justify-content-center" id="bodegasTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="inventory-tab" data-bs-toggle="tab" data-bs-target="#inventory" type="button" role="tab">
                    📦 Inventario
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="transactions-tab" data-bs-toggle="tab" data-bs-target="#transactions" type="button" role="tab">
                    🔄 Movimientos
                </button>
            </li>
            <li class="nav-item admin-only">
                <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button" role="tab">
                    ⚙️ Gestión
                </button>
            </li>
        </ul>

        <div class="tab-content" id="bodegasTabsContent">
            <!-- Inventory Tab -->
            <div class="tab-pane fade show active" id="inventory" role="tabpanel">
                <div class="card bg-dark text-light border-secondary">
                    <div class="card-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <input type="text" id="inventorySearch" class="form-control bg-dark text-light border-secondary" placeholder="Buscar por código o descripción...">
                            </div>
                            <div class="col-md-4">
                                <select id="categoryFilter" class="form-select bg-dark text-light border-secondary">
                                    <option value="">Todas las categorías</option>
                                </select>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-dark table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Código</th>
                                        <th>Descripción</th>
                                        <th>Categoría</th>
                                        <th>Unidad</th>
                                        <th class="text-center">Stock Actual</th>
                                        <th class="text-center">Min. Stock</th>
                                        <th class="text-center">Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="inventoryTableBody">
                                    <tr><td colspan="7" class="text-center">Cargando inventario...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Transactions Tab -->
            <div class="tab-pane fade" id="transactions" role="tabpanel">
                <div class="card bg-dark text-light border-secondary">
                    <div class="card-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <input type="date" id="dateFilter" class="form-control bg-dark text-light border-secondary">
                            </div>
                            <div class="col-md-4">
                                <select id="typeFilter" class="form-select bg-dark text-light border-secondary">
                                    <option value="">Todos los movimientos</option>
                                    <option value="IN">Ingresos</option>
                                    <option value="OUT">Egresos</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-outline-success w-100" onclick="exportToExcel()">📥 Exportar a Excel</button>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-dark table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Ítem</th>
                                        <th>Tipo</th>
                                        <th class="text-center">Cantidad</th>
                                        <th>Motivo/Referencia</th>
                                        <th>Responsable</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsTableBody">
                                    <tr><td colspan="6" class="text-center">Cargando movimientos...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Admin Tab -->
            <div class="tab-pane fade" id="admin" role="tabpanel">
                <div class="row g-4">
                    <!-- New Item Form -->
                    <div class="col-lg-6">
                        <div class="card bg-dark text-light border-secondary h-100">
                            <div class="card-header border-secondary">
                                <h5 class="mb-0">➕ Nuevo Artículo</h5>
                            </div>
                            <div class="card-body">
                                <form id="itemForm">
                                    <div class="mb-3">
                                        <label class="form-label">Código</label>
                                        <input type="text" id="itemCode" class="form-control bg-dark text-light border-secondary" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Descripción</label>
                                        <input type="text" id="itemDescription" class="form-control bg-dark text-light border-secondary" required>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Categoría</label>
                                            <input type="text" id="itemCategory" class="form-control bg-dark text-light border-secondary">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Unidad</label>
                                            <input type="text" id="itemUnit" class="form-control bg-dark text-light border-secondary" placeholder="UND, KG, MT, etc.">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Stock Mínimo</label>
                                            <input type="number" id="itemMinStock" class="form-control bg-dark text-light border-secondary" value="0">
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Registrar Artículo</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- New Transaction Form -->
                    <div class="col-lg-6">
                        <div class="card bg-dark text-light border-secondary h-100">
                            <div class="card-header border-secondary">
                                <h5 class="mb-0">🔄 Registrar Movimiento (Ingreso/Egreso)</h5>
                            </div>
                            <div class="card-body">
                                <form id="transactionForm">
                                    <div class="mb-3">
                                        <label class="form-label">Seleccionar Artículo</label>
                                        <select id="transItem" class="form-select bg-dark text-light border-secondary" required>
                                            <option value="">Seleccione un ítem...</option>
                                        </select>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Tipo</label>
                                            <select id="transType" class="form-select bg-dark text-light border-secondary" required>
                                                <option value="IN">Ingreso (Stock +)</option>
                                                <option value="OUT">Egreso (Stock -)</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Cantidad</label>
                                            <input type="number" id="transQty" class="form-control bg-dark text-light border-secondary" required min="0.01" step="0.01">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Motivo / Referencia</label>
                                        <textarea id="transReason" class="form-control bg-dark text-light border-secondary" rows="2"></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100">Procesar Movimiento</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="../auth.js?v=2.1.0"></script>
    <script src="script.js?v=1.0.0"></script>
</body>
</html>
